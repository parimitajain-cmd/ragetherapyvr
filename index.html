<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Office Rage VR - Quest 3S</title>
    <meta name="description" content="A-Frame VR Rage Room">
    <!-- A-Frame Core -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- Physics System -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <!-- Environment & Extras -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>
    <!-- Teleport Controls -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-blink-controls/dist/aframe-blink-controls.min.js"></script>
    <!-- Super Hands for Grabbing -->
    <script src="https://unpkg.com/super-hands@^3.0.3/dist/super-hands.min.js"></script>

    <script>
      /**
       * SHIMS & FIXES for A-Frame 1.5.0 + THREE.js 0.158.0
       */
      if (typeof THREE.BufferAttribute !== 'undefined' && !THREE.BufferAttribute.prototype.setDynamic) {
        THREE.BufferAttribute.prototype.setDynamic = function(value) {
          this.usage = value ? THREE.DynamicDrawUsage : THREE.StaticDrawUsage;
          return this;
        };
      }
      if (typeof THREE.PlaneBufferGeometry === 'undefined') {
        THREE.PlaneBufferGeometry = THREE.PlaneGeometry;
      }

      // Component to handle object destruction logic
      AFRAME.registerComponent('destructible', {
        schema: {
          health: {type: 'number', default: 3},
          type: {type: 'string', default: 'generic'},
          pieces: {type: 'number', default: 5}
        },

        init: function () {
          this.el.classList.add('target');
          
          const setOriginalColor = () => {
            const mesh = this.el.getObject3D('mesh');
            if (mesh && mesh.material) {
              this.originalColor = '#' + mesh.material.color.getHexString();
            } else {
              this.originalColor = this.el.getAttribute('material')?.color || '#ffffff';
            }
          };

          if (this.el.getAttribute('material')) {
            setOriginalColor();
          } else {
            this.el.addEventListener('materialtextured', setOriginalColor);
            this.el.addEventListener('loaded', setOriginalColor);
          }
        },

        hit: function (damage) {
          this.data.health -= damage;
          this.el.setAttribute('material', 'color', '#ff0000');
          setTimeout(() => {
            if (this.el) this.el.setAttribute('material', 'color', this.originalColor || '#ffffff');
          }, 100);

          if (this.data.health <= 0) {
            this.explode();
          }
        },

        explode: function () {
          const el = this.el;
          const worldPos = new THREE.Vector3();
          el.object3D.getWorldPosition(worldPos);
          const scene = el.sceneEl;

          const soundId = `#sound-${this.data.type}`;
          const soundEntity = document.createElement('a-entity');
          soundEntity.setAttribute('position', worldPos);
          soundEntity.setAttribute('sound', {src: soundId, autoplay: true, volume: 2, poolSize: 10});
          scene.appendChild(soundEntity);

          for (let i = 0; i < this.data.pieces; i++) {
            const piece = document.createElement('a-box');
            piece.setAttribute('width', 0.2);
            piece.setAttribute('height', 0.2);
            piece.setAttribute('depth', 0.2);
            piece.setAttribute('position', {
              x: worldPos.x + (Math.random() - 0.5) * 0.5,
              y: worldPos.y + (Math.random() - 0.5) * 0.5,
              z: worldPos.z + (Math.random() - 0.5) * 0.5
            });
            piece.setAttribute('material', {color: this.originalColor || '#ccc', metalness: 0.5});
            piece.setAttribute('dynamic-body', {mass: 0.5});
            piece.setAttribute('life-span', ""); 
            scene.appendChild(piece);
          }

          if (this.data.type === 'table') {
            const cup = document.querySelector('#coffee-cup');
            if (cup) cup.setAttribute('dynamic-body', 'mass: 1');
          }

          el.parentNode.removeChild(el);
        }
      });

      AFRAME.registerComponent('weapon', {
        schema: {
          damage: {type: 'number', default: 1},
          hapticIntensity: {type: 'number', default: 0.8}
        },

        init: function () {
          this.el.addEventListener('collisestart', (e) => {
            const target = e.detail.targetEl;
            if (target && target.components.destructible) {
              target.components.destructible.hit(this.data.damage);
              
              const hands = document.querySelectorAll('[hand-controls]');
              hands.forEach(hand => {
                const controller = hand.components['tracked-controls'] && hand.components['tracked-controls'].controller;
                if (controller && controller.gamepad && controller.gamepad.hapticActuators) {
                  const actuator = controller.gamepad.hapticActuators[0];
                  if (actuator) actuator.pulse(this.data.hapticIntensity, 100);
                }
              });
            }
          });
        }
      });

      AFRAME.registerComponent('life-span', {
        init: function () {
          setTimeout(() => {
            if (this.el.parentNode) this.el.parentNode.removeChild(this.el);
          }, 5000);
        }
      });

      AFRAME.registerComponent('grabbable-weapon', {
        init: function() {
          this.el.addEventListener('grab-start', () => {
             this.el.removeAttribute('dynamic-body');
          });
          this.el.addEventListener('grab-end', () => {
             this.el.setAttribute('dynamic-body', 'mass: 2');
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene 
      physics="gravity: -9.8; debug: false;" 
      renderer="antialias: true; colorManagement: true;"
      fog="type: linear; color: #a3a3a3; near: 2; far: 15">
      
      <a-assets>
        <!-- Added crossorigin="anonymous" to fix SecurityError: texSubImage2D -->
        <img id="floorTex" src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/grid.png" crossorigin="anonymous">
        <audio id="sound-printer" src="https://cdn.freesound.org/previews/234/234553_4102838-lq.mp3" crossorigin="anonymous"></audio>
        <audio id="sound-monitor" src="https://cdn.freesound.org/previews/328/328117_5121236-lq.mp3" crossorigin="anonymous"></audio>
        <audio id="sound-chair" src="https://cdn.freesound.org/previews/174/174457_3221445-lq.mp3" crossorigin="anonymous"></audio>
        <audio id="sound-cabinet" src="https://cdn.freesound.org/previews/404/404743_7413643-lq.mp3" crossorigin="anonymous"></audio>
        <audio id="sound-ambient" src="https://cdn.freesound.org/previews/484/484210_10255393-lq.mp3" crossorigin="anonymous"></audio>
      </a-assets>

      <a-entity sound="src: #sound-ambient; autoplay: true; loop: true; volume: 0.5"></a-entity>

      <!-- Player & Hands -->
      <a-entity id="rig" position="0 0 2">
        <a-camera id="head" look-controls wasd-controls position="0 1.6 0"></a-camera>
        
        <a-entity id="leftHand" 
          hand-controls="hand: left; handModelStyle: lowPoly; color: #ffcccc"
          blink-controls="cameraRig: #rig; teleportOrigin: #head; button: trigger;"
          super-hands="colliderEvent: raycasterintersection; colliderEventProperty: els; colliderEndEvent: raycasterintersectioncleared; colliderEndEventProperty: clearedEls;"
          sphere-collider="objects: .grabbable; radius: 0.15">
        </a-entity>

        <a-entity id="rightHand" 
          hand-controls="hand: right; handModelStyle: lowPoly; color: #ffcccc"
          super-hands="colliderEvent: raycasterintersection; colliderEventProperty: els; colliderEndEvent: raycasterintersectioncleared; colliderEndEventProperty: clearedEls;"
          sphere-collider="objects: .grabbable; radius: 0.15">
        </a-entity>
      </a-entity>

      <!-- Environment -->
      <a-sky color="#888"></a-sky>
      <!-- Added color fallback to plane in case image still fails -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="16" height="16" material="src: #floorTex; repeat: 8 8; color: #444" static-body></a-plane>
      
      <!-- Room Boundaries -->
      <a-box position="0 1.5 -4" width="8" height="3" depth="0.1" material="color: #ccc" static-body></a-box>
      <a-box position="0 1.5 4" width="8" height="3" depth="0.1" material="color: #ccc" static-body></a-box>
      <a-box position="-4 1.5 0" width="0.1" height="3" depth="8" material="color: #ccc" static-body></a-box>
      <a-box position="4 1.5 0" width="0.1" height="3" depth="8" material="color: #ccc" static-body></a-box>

      <!-- Lighting -->
      <a-entity light="type: ambient; intensity: 0.4"></a-entity>
      <a-entity light="type: point; intensity: 0.8; distance: 10" position="0 2.8 0"></a-entity>
      <a-entity position="0 2.9 0" light="type: spot; angle: 60; intensity: 1; color: #f0faff" 
                animation="property: light.intensity; from: 1; to: 0.8; dur: 100; dir: alternate; loop: true; easing: easeInOutSine"></a-entity>

      <!-- Weapons Table -->
      <a-box id="spawn-table" position="0 0.4 0" width="1.5" height="0.8" depth="0.8" material="color: #5d4037" static-body>
        <a-entity id="sledgehammer" position="-0.3 0.5 0" rotation="0 0 90" 
                  class="grabbable" grabbable-weapon weapon="damage: 2; hapticIntensity: 1" dynamic-body="mass: 5">
          <a-cylinder radius="0.03" height="1.2" material="color: #4e342e"></a-cylinder>
          <a-box width="0.2" height="0.15" depth="0.3" position="0 0.6 0" material="color: #333"></a-box>
        </a-entity>
        
        <a-entity id="bat" position="0.3 0.5 0" rotation="0 0 45" 
                  class="grabbable" grabbable-weapon weapon="damage: 1; hapticIntensity: 0.6" dynamic-body="mass: 2">
          <a-cylinder radius="0.02" height="0.8" position="0 0 0" material="color: #ddd"></a-cylinder>
          <a-text value="MICROMANAGER" align="center" position="0 0.1 0.03" scale="0.1 0.1 0.1" color="black"></a-text>
        </a-entity>
      </a-box>

      <!-- Office Items -->
      <a-entity position="-2 0.8 -3" destructible="health: 2; type: printer; pieces: 8">
        <a-box width="0.5" height="0.3" depth="0.4" material="color: #e5e5e5" static-body></a-box>
      </a-entity>

      <a-entity position="-1 1.2 -3" destructible="health: 1; type: monitor; pieces: 6">
        <a-box width="0.6" height="0.4" depth="0.05" material="color: #222" static-body></a-box>
        <a-plane width="0.55" height="0.35" position="0 0 0.026" material="color: #000; emissive: #004400"
                 text="value: PC LOAD LETTER; align: center; width: 1"></a-plane>
      </a-entity>

      <a-entity position="-3 0 1" rotation="0 45 0" destructible="health: 1; type: chair; pieces: 10">
        <a-box width="0.5" height="0.1" depth="0.5" position="0 0.5 0" material="color: #333" static-body></a-box>
        <a-box width="0.5" height="0.6" depth="0.05" position="0 0.8 -0.25" material="color: #333"></a-box>
        <a-cylinder radius="0.03" height="0.5" position="0 0.25 0" material="color: #222"></a-cylinder>
      </a-entity>

      <a-entity position="3 0 -1" destructible="health: 4; type: cabinet; pieces: 12">
        <a-box width="0.6" height="1.4" depth="0.6" material="color: #90a4ae" static-body></a-box>
      </a-entity>

      <a-entity id="wobbly-table" position="2 0 2" destructible="health: 2; type: table; pieces: 5">
        <a-box width="1.2" height="0.05" depth="0.8" position="0 0.75 0" material="color: #8d6e63" static-body></a-box>
        <a-cylinder radius="0.02" height="0.75" position="-0.5 0.375 -0.3" material="color: #5d4037"></a-cylinder>
        <a-cylinder radius="0.02" height="0.75" position="0.5 0.375 -0.3" material="color: #5d4037"></a-cylinder>
        <a-cylinder radius="0.02" height="0.75" position="0.5 0.375 0.3" material="color: #5d4037"></a-cylinder>
        <a-cylinder radius="0.02" height="0.6" position="-0.5 0.3 0.3" material="color: #5d4037"></a-cylinder>
        <a-entity id="coffee-cup" position="0 0.8 0" class="grabbable" dynamic-body="mass: 0.1">
          <a-cylinder radius="0.04" height="0.1" material="color: white"></a-cylinder>
        </a-entity>
      </a-entity>

    </a-scene>

    <div style="position: absolute; bottom: 20px; left: 20px; color: white; font-family: sans-serif; pointer-events: none; text-shadow: 1px 1px 2px black;">
      <h2>Office Rage VR</h2>
      <p>Quest: Grip to grab weapons. Left Trigger to teleport.</p>
    </div>
  </body>
</html>
