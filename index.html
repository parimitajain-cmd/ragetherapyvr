<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Corporate Catharsis VR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <script src="https://unpkg.com/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #instructions {
            position: absolute; top: 15px; left: 15px; color: #ffcc00;
            font-family: 'Courier New', Courier, monospace; pointer-events: none; z-index: 10;
            background: rgba(40, 20, 0, 0.8); padding: 12px; border-radius: 8px;
            font-size: 14px; line-height: 1.4; border: 1px solid #ffaa00;
        }
        #fade-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffcc99; opacity: 0; pointer-events: none; z-index: 9;
            transition: opacity 1.5s ease;
        }
    </style>
</head>
<body>

<div id="fade-overlay"></div>
<div id="instructions">
    [SYSTEM_STATUS: STRESSED]<br>
    - MOUSE: Click & Hold to Drag/Throw. Click fast to hit.<br>
    - VR: Grab Bat (Grip). Swing to strike.<br>
    - GOAL: Release the pressure to find the sun.
</div>

<a-scene 
    physics="debug: false; gravity: -9.8;"
    renderer="antialias: true; colorManagement: true;"
    background="color: #050505">
    
    <a-assets>
        <a-mixin id="debris" geometry="primitive: box; width: 0.1; height: 0.1; depth: 0.1" material="color: #444"></a-mixin>
        <a-mixin id="petal" geometry="primitive: plane; width: 0.1; height: 0.1" material="color: #ffb7c5; side: double; transparent: true; opacity: 0.8"></a-mixin>
    </a-assets>

    <!-- Camera Rig -->
    <a-entity id="rig" position="0 0 4">
        <a-entity id="camera" camera look-controls="pointerLockEnabled: false" wasd-controls position="0 1.6 0">
            <a-cursor id="cursor" raycaster="objects: .clickable" material="color: #ffaa00; shader: flat" 
                      geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"></a-cursor>
            <a-text id="transition-text" value="" align="center" position="0 0 -1" scale="0.5 0.5 0.5" color="#fff" visible="false"></a-text>
        </a-entity>
        <a-entity id="lhand" hand-controls="hand: left" sphere-collider="objects: .grabbable" super-hands></a-entity>
        <a-entity id="rhand" hand-controls="hand: right" sphere-collider="objects: .grabbable" super-hands></a-entity>
    </a-entity>

    <a-entity id="world">
        <!-- Rage Room Elements -->
        <a-entity id="rage-elements">
            <a-plane id="office-floor" static-body rotation="-90 0 0" width="100" height="100" material="color: #111; roughness: 1"></a-plane>
            <a-light type="ambient" intensity="0.3"></a-light>
            <a-light type="directional" position="1 4 2" intensity="0.5"></a-light>

            <a-entity id="hub-ui" position="0 1.5 0">
                <a-text value="CORPORATE CATHARSIS" align="center" position="0 0.8 0" color="#ffaa00" width="6"></a-text>
                <a-box class="clickable" id="start-btn" position="0 0 0" width="2" height="0.6" depth="0.1" material="color: #332211"
                       event-set__enter="_event: mouseenter; material.color: #553311"
                       event-set__leave="_event: mouseleave; material.color: #332211">
                    <a-text value="BEGIN RELEASE" align="center" position="0 0 0.06" width="4"></a-text>
                </a-box>
            </a-entity>
        </a-entity>

        <!-- Golden Hour Zen Elements -->
        <a-entity id="zen-elements" position="0 -200 0" visible="false">
            <a-sky color="#ffcc99"></a-sky> <!-- Warm Sunset Sky -->
            
            <!-- Sun on the horizon -->
            <a-sphere position="0 5 -50" radius="8" material="shader: flat; color: #ff6600; emissive: #ffaa00; emissiveIntensity: 2"></a-sphere>
            
            <!-- Golden Hour Lighting -->
            <a-light type="ambient" color="#ffccaa" intensity="0.5"></a-light>
            <a-light type="directional" color="#ffaa66" intensity="1.2" position="-10 10 -10" target="#rig"></a-light>
        </a-entity>
    </a-entity>

</a-scene>

<script>
/* ================= DRAG COMPONENT ================= */
AFRAME.registerComponent('click-drag', {
    init: function() {
        this.isDragging = false;
        this.camera = document.querySelector('[camera]');
        this.el.addEventListener('mousedown', () => {
            if (this.el.body) {
                this.isDragging = true;
                this.el.body.type = CANNON.Body.KINEMATIC;
            }
        });
        window.addEventListener('mouseup', () => {
            if (this.isDragging) {
                this.isDragging = false;
                if (this.el.body) {
                    this.el.body.type = CANNON.Body.DYNAMIC;
                    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.object3D.quaternion);
                    this.el.body.velocity.set(dir.x * 15, dir.y * 15, dir.z * 15);
                }
            }
        });
    },
    tick: function() {
        if (this.isDragging) {
            const v = new THREE.Vector3(0, 0, -3).applyQuaternion(this.camera.object3D.quaternion).add(this.camera.object3D.getWorldPosition(new THREE.Vector3()));
            this.el.object3D.position.copy(v);
            if (this.el.body) this.el.body.position.copy(v);
        }
    }
});

/* ================= SHATTER LOGIC ================= */
AFRAME.registerComponent('shatterable', {
    init: function() {
        this.hp = 2;
        this.el.addEventListener('collide', (e) => {
            if (e.detail.contact.getImpactVelocityAlongNormal() > 4) this.hit();
        });
        this.el.addEventListener('click', () => { if(!this.el.components['click-drag'].isDragging) this.hit(); });
    },
    hit: function() {
        this.hp--;
        this.el.setAttribute('material', 'emissive: #ffcc00; emissiveIntensity: 0.8');
        setTimeout(() => this.el && this.el.setAttribute('material', 'emissiveIntensity: 0'), 100);
        if (this.hp <= 0) setTimeout(() => this.shatter(), 0);
    },
    shatter: function() {
        if (!this.el.parentNode) return;
        const pos = this.el.object3D.position;
        for(let i=0; i<6; i++) {
            const b = document.createElement('a-entity');
            b.setAttribute('mixin', 'debris');
            b.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
            b.setAttribute('dynamic-body', 'mass: 0.1');
            this.el.sceneEl.appendChild(b);
            setTimeout(() => b.parentNode && b.parentNode.removeChild(b), 2000);
        }
        this.el.parentNode.removeChild(this.el);
        checkWin();
    }
});

/* ================= GAME FLOW ================= */
let destroyedCount = 0;
const rageGroup = document.querySelector('#rage-elements');
const zenGroup = document.querySelector('#zen-elements');

function checkWin() {
    destroyedCount++;
    if (destroyedCount >= 6) startZenTransition();
}

function startZenTransition() {
    const fade = document.querySelector('#fade-overlay');
    const txt = document.querySelector('#transition-text');
    fade.style.opacity = '1';
    txt.setAttribute('visible', 'true');
    txt.setAttribute('value', 'LET IT GO...');

    setTimeout(() => {
        document.querySelector('#rig').setAttribute('position', '0 -200 5');
        rageGroup.setAttribute('visible', 'false');
        zenGroup.setAttribute('visible', 'true');
        setupZenGarden();
        
        txt.setAttribute('value', 'YOU ARE HERE.');
        fade.style.opacity = '0';
        document.querySelector('#instructions').style.color = "#ffaa00";
        document.querySelector('#instructions').innerHTML = "[STATUS: PEACEFUL]<br>The sun sets on your stress.";
        setTimeout(() => { txt.setAttribute('visible', 'false'); }, 3000);
    }, 1600);
}

function spawnItem(x, z, color, size) {
    const el = document.createElement('a-box');
    el.setAttribute('position', `${x} 1 ${z}`);
    el.setAttribute('geometry', size);
    el.setAttribute('material', `color: ${color}`);
    el.setAttribute('class', 'clickable grabbable');
    el.setAttribute('dynamic-body', 'mass: 2');
    el.setAttribute('click-drag', '');
    el.setAttribute('shatterable', '');
    rageGroup.appendChild(el);
}

document.querySelector('#start-btn').addEventListener('click', () => {
    document.querySelector('#hub-ui').setAttribute('visible', 'false');
    for(let i=0; i<3; i++) spawnItem(i-1, -2, '#999', 'width: 0.6; height: 0.4; depth: 0.6');
    for(let i=0; i<3; i++) spawnItem(i-1, -4, '#222', 'width: 0.8; height: 0.1; depth: 0.6');
    
    const bat = document.createElement('a-box');
    bat.setAttribute('position', '0 1 1');
    bat.setAttribute('geometry', 'width: 0.1; height: 1.2; depth: 0.1');
    bat.setAttribute('material', 'color: #553311');
    bat.setAttribute('class', 'clickable grabbable');
    bat.setAttribute('dynamic-body', 'mass: 5');
    bat.setAttribute('click-drag', '');
    rageGroup.appendChild(bat);
});

/* ================= ZEN GENERATION ================= */
function setupZenGarden() {
    // Warm Mossy Ground
    const g = document.createElement('a-circle');
    g.setAttribute('radius', '40');
    g.setAttribute('rotation', '-90 0 0');
    g.setAttribute('material', 'color: #443311; roughness: 1');
    g.setAttribute('static-body', '');
    zenGroup.appendChild(g);

    // Warm haze / fog
    document.querySelector('a-scene').setAttribute('fog', 'type: exponential; color: #ffcc99; density: 0.02');

    // Trees and Petals
    for(let i=0; i<10; i++) {
        const angle = (i / 10) * Math.PI * 2;
        const dist = 8 + Math.random() * 6;
        const x = Math.cos(angle) * dist;
        const z = Math.sin(angle) * dist;
        
        const tree = document.createElement('a-entity');
        tree.setAttribute('position', `${x} 0 ${z}`);
        tree.innerHTML = `
            <a-cylinder radius="0.25" height="5" material="color: #331a00" position="0 2.5 0"></a-cylinder>
            <a-sphere radius="2.5" position="0 5 0" material="color: #ff99aa; opacity: 0.8" 
                      animation="property: scale; to: 1.05 1.1 1.05; dir: alternate; dur: 4000; loop: true"></a-sphere>
        `;
        zenGroup.appendChild(tree);

        // Falling Petals from each tree
        for(let j=0; j<5; j++) {
            const p = document.createElement('a-entity');
            p.setAttribute('mixin', 'petal');
            let startY = 4 + Math.random() * 2;
            p.setAttribute('position', `${x + (Math.random()-0.5)*3} ${startY} ${z + (Math.random()-0.5)*3}`);
            p.setAttribute('animation__fall', `property: position; to: ${x + (Math.random()-0.5)*3} 0.1 ${z + (Math.random()-0.5)*3}; dur: ${6000 + Math.random()*4000}; loop: true; easing: linear`);
            p.setAttribute('animation__rot', `property: rotation; to: 360 360 0; dur: 5000; loop: true; easing: linear`);
            zenGroup.appendChild(p);
        }
    }

    // Tall glowing grass
    for(let i=0; i<40; i++) {
        const grass = document.createElement('a-cylinder');
        const gx = (Math.random()-0.5)*20;
        const gz = (Math.random()-0.5)*20;
        grass.setAttribute('position', `${gx} 0.5 ${gz}`);
        grass.setAttribute('radius', '0.01');
        grass.setAttribute('height', '1');
        grass.setAttribute('material', 'color: #ffcc66; emissive: #ffaa00; emissiveIntensity: 0.3');
        grass.setAttribute('animation', 'property: rotation; to: 5 0 5; dir: alternate; dur: 2000; loop: true');
        zenGroup.appendChild(grass);
    }

    const msg = document.createElement('a-text');
    msg.setAttribute('value', 'THE DAY IS DONE.\nEVERYTHING IS OKAY.');
    msg.setAttribute('align', 'center');
    msg.setAttribute('position', '0 2.5 -2');
    msg.setAttribute('color', '#fff');
    msg.setAttribute('width', '5');
    msg.setAttribute('font', 'kelsonsans');
    zenGroup.appendChild(msg);
}
</script>
</body>
</html>
