<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Corporate Catharsis - Office Rage Room</title>
  
  <!-- 1. Load A-Frame FIRST -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- 2. THREE.JS COMPATIBILITY SHIM -->
  <script>
    (function fixThreeCompatibility() {
      if (typeof THREE === 'undefined') return;
      const geometries = ['Plane', 'Box', 'Sphere', 'Cylinder', 'Ring', 'Cone', 'Torus', 'TorusKnot', 'Tetrahedron'];
      geometries.forEach(geo => {
        if (THREE[geo + 'Geometry'] && !THREE[geo + 'BufferGeometry']) {
          THREE[geo + 'BufferGeometry'] = THREE[geo + 'Geometry'];
        }
      });
      if (THREE.BufferAttribute && !THREE.BufferAttribute.prototype.setDynamic) {
        THREE.BufferAttribute.prototype.setDynamic = function (isDynamic) {
          this.setUsage(isDynamic ? THREE.DynamicDrawUsage : THREE.StaticDrawUsage);
          return this;
        };
      }
      if (THREE.BufferGeometry && !THREE.BufferGeometry.prototype.addAttribute) {
        THREE.BufferGeometry.prototype.addAttribute = function (name, attribute) {
          return this.setAttribute(name, attribute);
        };
      }
    })();
  </script>

  <!-- 3. Plugins -->
  <script src="https://unpkg.com/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>
  <script src="https://unpkg.com/aframe-teleport-controls@0.3.1/dist/aframe-teleport-controls.min.js"></script>
  <script src="https://unpkg.com/super-hands@3.0.4/dist/super-hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-extras@v0.1.0/dist/aframe-physics-extras.min.js"></script>

  <style>
    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
    }
    #overlay h1 { font-size: 3rem; margin-bottom: 0.5rem; color: #ff4444; text-transform: uppercase; letter-spacing: 5px; }
    #overlay p { font-size: 1.2rem; max-width: 600px; margin-bottom: 2rem; color: #ccc; }
    #start-btn {
      padding: 15px 40px;
      font-size: 1.5rem;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    #start-btn:hover { background: #cc0000; transform: scale(1.1); }
  </style>

  <script>
    // System to manage game state
    let gameStarted = false;

    // Logic for the analog clock
    AFRAME.registerComponent('clock-logic', {
      init: function () {
        this.hourHand = this.el.querySelector('.hour-hand');
        this.minHand = this.el.querySelector('.min-hand');
      },
      tick: function () {
        const now = new Date();
        const h = now.getHours() % 12, m = now.getMinutes(), s = now.getSeconds();
        this.hourHand.setAttribute('rotation', `0 0 ${-(h * 30 + m * 0.5)}`);
        this.minHand.setAttribute('rotation', `0 0 ${-(m * 6 + s * 0.1)}`);
      }
    });

    // Component to handle "smashing" logic
    AFRAME.registerComponent('smashable', {
      schema: {
        health: {type: 'number', default: 3},
        smashedColor: {type: 'color', default: '#555'}
      },
      init: function () {
        this.el.addEventListener('collidestart', (e) => {
          const target = e.detail.targetEl;
          if (target && target.classList.contains('weapon')) {
            this.takeDamage();
          }
        });
      },
      takeDamage: function() {
        this.data.health--;
        const currentScale = this.el.getAttribute('scale') || {x: 1, y: 1, z: 1};
        this.el.setAttribute('scale', {
          x: currentScale.x * 0.9,
          y: currentScale.y * 0.9,
          z: currentScale.z * 0.9
        });
        if (this.data.health <= 0) {
          this.el.setAttribute('color', this.data.smashedColor);
          if (this.el.body && this.el.body.type === CANNON.Body.STATIC) {
            this.el.setAttribute('static-body', 'enabled: false');
            this.el.setAttribute('dynamic-body', 'mass: 5');
          }
        }
      }
    });

    // Boss Movement AI
    AFRAME.registerComponent('boss-behavior', {
      init: function () {
        this.targetPos = new THREE.Vector3();
        this.velocity = new THREE.Vector3();
        this.isMoving = false;
        // Don't start moving until game starts
      },
      setNewTarget: function () {
        if (!gameStarted) return;
        this.targetPos.set((Math.random() - 0.5) * 6, 0, (Math.random() - 0.5) * 6);
        this.isMoving = true;
      },
      tick: function (time, timeDelta) {
        if (!gameStarted) return;
        if (!this.isMoving) {
          this.setNewTarget();
          return;
        }
        const currentPos = this.el.object3D.position;
        const distance = currentPos.distanceTo(this.targetPos);
        if (distance < 0.2) {
          this.isMoving = false;
          setTimeout(() => { this.setNewTarget(); }, 2000 + Math.random() * 2000);
          return;
        }
        this.velocity.subVectors(this.targetPos, currentPos).normalize();
        const speed = 0.0015 * timeDelta;
        this.el.object3D.position.addScaledVector(this.velocity, speed);
        const angle = Math.atan2(this.velocity.x, this.velocity.z);
        this.el.object3D.rotation.y = angle;
      }
    });

    function startGame() {
      gameStarted = true;
      document.getElementById('overlay').style.display = 'none';
      // Audio can be played here if desired
    }
  </script>
</head>
<body>

  <!-- Entry Screen Overlay -->
  <div id="overlay">
    <h1>Corporate Catharsis</h1>
    <p>The deadline has passed. The coffee is cold. The boss is breathing down your neck. <br><br> Pick up the bat or hammer and let out some steam. Smash the laptops, throw the chairs, and finally give that printer what it deserves.</p>
    <button id="start-btn" onclick="startGame()">ENTER OFFICE</button>
  </div>

  <a-scene physics="driver: local; gravity: -9.8; debug: false;">
    
    <a-assets>
      <img id="black-tile" src="https://cdn.glitch.global/605e2a51-d45f-4d87-a285-9410ad350515/floor_tile.jpg?v=1642512345" crossorigin="anonymous">
    </a-assets>

    <!-- Camera Rig -->
    <a-entity id="cameraRig" position="0 0 5">
      <a-entity id="head" camera position="0 1.6 0" look-controls wasd-controls>
        <!-- Simple Cursor for non-VR testing -->
        <a-cursor fuse="false" raycaster="objects: .weapon" color="red"></a-cursor>
      </a-entity>
      
      <a-entity id="leftHand" 
                super-hands="colliderEvent: raycaster-intersection; colliderEventProperty: els; colliderEndEvent: raycaster-intersection-cleared; colliderEndEventProperty: clearedEls"
                static-body="shape: sphere; sphereRadius: 0.02"
                physics-collider
                sphere-collider="objects: .weapon"
                hand-controls="hand: left">
      </a-entity>

      <a-entity id="rightHand" 
                super-hands="colliderEvent: raycaster-intersection; colliderEventProperty: els; colliderEndEvent: raycaster-intersection-cleared; colliderEndEventProperty: clearedEls"
                static-body="shape: sphere; sphereRadius: 0.02"
                physics-collider
                sphere-collider="objects: .weapon"
                hand-controls="hand: right">
      </a-entity>
      
      <a-entity laser-controls="hand: right" teleport-controls="cameraRig: #cameraRig; teleportOrigin: #head; collisionEntities: .navmesh"></a-entity>
    </a-entity>

    <!-- Environment -->
    <a-entity id="room">
      <a-plane class="navmesh" rotation="-90 0 0" width="12" height="12" color="#111" static-body></a-plane>
      <a-box position="0 2 -6" width="12" height="4" depth="0.2" color="#eee" static-body></a-box>
      <a-box position="0 2 6" width="12" height="4" depth="0.2" color="#eee" static-body></a-box>
      <a-box position="-6 2 0" width="0.2" height="4" depth="12" color="#eee" static-body></a-box>
      <a-box position="6 2 0" width="0.2" height="4" depth="12" color="#eee" static-body></a-box>
      <a-box position="0 4 0" width="12" height="0.1" depth="12" color="#fff" static-body></a-box>
    </a-entity>

    <!-- Central Workstations -->
    <a-entity id="work-area">
      <script>
        const createWorkstation = (x, z) => {
          const group = document.createElement('a-entity');
          group.setAttribute('position', `${x} 0 ${z}`);
          
          const desk = document.createElement('a-box');
          desk.setAttribute('position', '0 0.75 0');
          desk.setAttribute('width', '1.5'); desk.setAttribute('height', '0.05'); desk.setAttribute('depth', '0.8');
          desk.setAttribute('color', '#d2b48c');
          desk.setAttribute('static-body', '');
          desk.setAttribute('smashable', 'health: 5; smashedColor: #8b4513');
          group.appendChild(desk);

          [-0.4, 0.4].forEach(offset => {
            const laptop = document.createElement('a-box');
            laptop.setAttribute('position', `${offset} 0.8 0`);
            laptop.setAttribute('width', '0.35'); laptop.setAttribute('height', '0.05'); laptop.setAttribute('depth', '0.25');
            laptop.setAttribute('color', '#333');
            laptop.setAttribute('dynamic-body', 'mass: 0.5');
            laptop.setAttribute('smashable', 'health: 1; smashedColor: #000');
            group.appendChild(laptop);
          });

          const chairGroup = document.createElement('a-entity');
          chairGroup.setAttribute('position', '0 0 0.7');
          chairGroup.setAttribute('dynamic-body', 'mass: 2');
          chairGroup.setAttribute('smashable', 'health: 3');
          
          const seat = document.createElement('a-box');
          seat.setAttribute('position', '0 0.4 0');
          seat.setAttribute('width', '0.45'); seat.setAttribute('height', '0.08'); seat.setAttribute('depth', '0.45');
          seat.setAttribute('color', '#222');
          chairGroup.appendChild(seat);

          const back = document.createElement('a-box');
          back.setAttribute('position', '0 0.7 0.2');
          back.setAttribute('width', '0.45'); back.setAttribute('height', '0.6'); back.setAttribute('depth', '0.05');
          back.setAttribute('color', '#222');
          chairGroup.appendChild(back);

          group.appendChild(chairGroup);
          return group;
        };

        window.addEventListener('DOMContentLoaded', () => {
          const area = document.querySelector('#work-area');
          const positions = [{x: -2, z: -1.5}, {x: 2, z: -1.5}, {x: -2, z: 0.5}, {x: 2, z: 0.5}, {x: -2, z: 2.5}, {x: 2, z: 2.5}];
          positions.forEach(pos => area.appendChild(createWorkstation(pos.x, pos.z)));
        });
      </script>
    </a-entity>

    <!-- Boss -->
    <a-entity id="boss" position="0 0 -4" boss-behavior dynamic-body="mass: 80" smashable="health: 10; smashedColor: #ff0000">
      <a-box position="0 1 0" width="0.5" height="0.8" depth="0.3" color="#00008B"></a-box>
      <a-box position="0 1.6 0" width="0.3" height="0.3" depth="0.3" color="#ffe0bd"></a-box>
      <a-box position="0 1.45 0.16" width="0.05" height="0.2" depth="0.02" color="#ff0000"></a-box>
      <a-cylinder position="-0.15 0.4 0" radius="0.08" height="0.8" color="#000"></a-cylinder>
      <a-cylinder position="0.15 0.4 0" radius="0.08" height="0.8" color="#000"></a-cylinder>
    </a-entity>

    <!-- Weapons (Grabbable) -->
    <a-entity id="bat" class="weapon" position="5.5 0.5 -2" 
              grabbable stretchable draggable 
              dynamic-body="mass: 2" 
              collision-filter="group: hands; collidesWith: default, hands">
      <a-cylinder radius="0.03" height="0.8" color="#8B4513" rotation="0 0 10"></a-cylinder>
    </a-entity>

    <a-entity id="hammer" class="weapon" position="5.3 0.2 -2.5" 
              grabbable stretchable draggable 
              dynamic-body="mass: 4" 
              collision-filter="group: hands; collidesWith: default, hands">
      <a-entity rotation="90 0 0">
        <a-cylinder radius="0.02" height="0.4" color="#444"></a-cylinder>
        <a-box position="0 0.2 0" width="0.15" height="0.1" depth="0.1" color="#222"></a-box>
      </a-entity>
    </a-entity>

    <!-- Misc Office Props -->
    <a-entity position="-5 0 -5" smashable="health: 4">
      <a-box position="0 0.5 0" width="0.8" height="1" depth="0.8" color="#ccc" static-body></a-box>
      <a-box position="0 1.05 0" width="0.7" height="0.2" depth="0.7" color="#ddd"></a-box>
    </a-entity>

    <!-- Clock (Front Wall) -->
    <a-entity id="clock" position="0 2.5 -5.88" clock-logic>
      <a-cylinder rotation="90 0 0" radius="0.4" height="0.1" color="#fff"></a-cylinder>
      <a-box class="hour-hand" position="0 0 0.06" width="0.02" height="0.2" depth="0.01" color="#000" pivot="0 -0.1 0"></a-box>
      <a-box class="min-hand" position="0 0 0.07" width="0.015" height="0.3" depth="0.01" color="#000" pivot="0 -0.15 0"></a-box>
    </a-entity>

    <!-- Lighting -->
    <a-light type="ambient" color="#fff" intensity="0.5"></a-light>
    <a-light type="directional" position="-1 10 1" intensity="0.6"></a-light>

  </a-scene>
</body>
</html>
